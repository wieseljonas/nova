name: Rebuild E2B Sandbox Template

on:
  push:
    branches: [main]
    paths:
      - "sandbox/template.ts"
      - "sandbox/build.ts"
      - ".github/workflows/sandbox-template.yml"

jobs:
  rebuild-template:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build sandbox template
        env:
          E2B_API_KEY: ${{ secrets.E2B_API_KEY }}
        working-directory: apps/api
        run: npx tsx ../../sandbox/build.ts --prod
